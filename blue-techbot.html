<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blue Controller - Scoreboard</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
      :root {
        --bg: #f4f6f8;
        --panel: #ffffff;
        --border: #dce3ea;
        --blue: #0284c7;
        --blue-dim: #bae6fd;
        --blue-glow: rgba(2, 132, 199, 0.18);
        --gold: #ffd700;
        --text: #1e293b;
        --text-dim: #64748b;
        --font-head: "Orbitron", monospace;
        --font-mono: "Share Tech Mono", monospace;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-mono);
        min-height: 100vh;
        overflow-x: hidden;
      }

      body::before {
        display: none;
      }

      .header {
        text-align: center;
        padding: 24px 16px 12px;
        border-bottom: 1px solid var(--border);
        position: relative;
      }
      .header::after {
        content: "";
        position: absolute;
        bottom: -1px;
        left: 50%;
        transform: translateX(-50%);
        width: 200px;
        height: 1px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--blue),
          transparent
        );
        box-shadow: 0 0 12px var(--blue);
      }

      .header-title {
        font-family: var(--font-head);
        font-size: 18px;
        font-weight: 900;
        letter-spacing: 0.25em;
        color: var(--blue);
        text-transform: uppercase;
      }
      .header-sub {
        font-size: 11px;
        color: var(--text-dim);
        letter-spacing: 0.15em;
        margin-top: 4px;
      }

      .status-dot {
        display: inline-block;
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--blue);
        box-shadow: 0 0 8px var(--blue);
        animation: pulse 2s ease-in-out infinite;
        margin-right: 6px;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      .main {
        padding: 20px;
      }

      .team-panel {
        padding: 20px;
        border: 1px solid var(--border);
        background: var(--panel);
        box-shadow: 0 2px 12px rgba(15, 23, 42, 0.06);
        position: relative;
        border-radius: 8px;
      }

      .team-panel.blue::before {
        content: "";
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 2px;
        background: linear-gradient(
          90deg,
          transparent,
          var(--blue),
          transparent
        );
        border-radius: 8px 8px 0 0;
      }

      .team-header {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 14px;
      }

      .team-avatar-wrap {
        position: relative;
        width: 56px;
        height: 56px;
        flex-shrink: 0;
        cursor: pointer;
      }
      .team-avatar {
        width: 56px;
        height: 56px;
        border-radius: 4px;
        object-fit: cover;
        border: 2px solid var(--blue-dim);
        transition: border-color 0.2s;
        background: var(--panel);
        display: block;
      }
      .team-avatar-wrap:hover .team-avatar {
        border-color: var(--blue);
        box-shadow: 0 0 10px var(--blue-glow);
      }
      .avatar-overlay {
        position: absolute;
        inset: 0;
        background: rgba(0, 0, 0, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 9px;
        letter-spacing: 0.1em;
        color: #fff;
        opacity: 0;
        transition: opacity 0.2s;
        border-radius: 4px;
      }
      .team-avatar-wrap:hover .avatar-overlay {
        opacity: 1;
      }
      input[type="file"] {
        display: none;
      }

      .team-name-input {
        background: transparent;
        border: none;
        border-bottom: 1px solid var(--border);
        color: var(--blue);
        font-family: var(--font-head);
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.15em;
        padding: 4px 0;
        outline: none;
        width: 100%;
        text-transform: uppercase;
        transition: border-color 0.2s;
      }
      .team-name-input:focus {
        border-color: var(--blue);
      }

      .score-display {
        text-align: center;
        margin: 20px 0;
        font-family: var(--font-head);
        font-size: 72px;
        font-weight: 900;
        line-height: 1;
        letter-spacing: -0.02em;
        color: var(--blue);
        transition: transform 0.15s;
      }

      .score-buttons {
        display: grid !important;
        grid-template-columns: 1fr 1fr !important;
        gap: 8px !important;
        margin-top: 15px !important;
      }

      .score-btn {
        position: relative;
        padding: 8px 4px !important;
        font-family: var(--font-head);
        font-size: 11px !important;
        line-height: 1.2 !important;
        font-weight: 700;
        letter-spacing: 0.05em;
        border: 1px solid;
        background: transparent;
        cursor: pointer;
        border-radius: 6px !important;
        transition: all 0.12s;
        overflow: hidden;
      }
      .score-btn::before {
        content: "";
        position: absolute;
        inset: 0;
        opacity: 0;
        transition: opacity 0.12s;
        background: var(--blue-dim);
      }
      .score-btn:active {
        transform: scale(0.95);
      }

      .score-btn.add {
        color: var(--blue);
        border-color: var(--blue-dim);
        background: #fff;
      }
      .score-btn.add:hover {
        border-color: var(--blue);
        background: #f0f9ff;
        box-shadow: 0 2px 8px var(--blue-glow);
      }
      .score-btn.add:hover::before {
        opacity: 1;
      }

      .score-btn.sub {
        color: var(--text-dim) !important;
        border-color: var(--border) !important;
        background: #f8fafc !important;
        text-shadow: none !important;
      }
      .score-btn.sub:hover {
        color: var(--text) !important;
        border-color: #94a3b8 !important;
        background: #eef2f7 !important;
      }

      .score-btn.add.active {
        background: var(--blue) !important;
        color: #ffffff !important;
        border-color: var(--blue) !important;
        opacity: 1 !important;
      }
      .score-btn:disabled:not(.active) {
        opacity: 0.45 !important;
        cursor: not-allowed !important;
      }
      .score-btn.active:disabled {
        opacity: 1 !important;
      }

      .btn-label {
        position: relative;
        z-index: 1;
      }

      .footer-bar {
        padding: 14px 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        border-top: 1px solid var(--border);
        background: var(--panel);
        flex-wrap: wrap;
      }

      .action-btn {
        font-family: var(--font-head);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        padding: 9px 18px;
        border: 1px solid;
        background: transparent;
        cursor: pointer;
        border-radius: 2px;
        transition: all 0.15s;
      }

      .btn-reset {
        color: #ff6b35;
        border-color: rgba(255, 107, 53, 0.4);
      }
      .btn-reset:hover {
        background: rgba(255, 107, 53, 0.08);
        box-shadow: 0 0 14px rgba(255, 107, 53, 0.3);
        border-color: #ff6b35;
      }

      .status-text {
        font-size: 10px;
        color: var(--text-dim);
        letter-spacing: 0.1em;
      }

      .score-bump {
        animation: bump 0.2s ease-out;
      }
      @keyframes bump {
        0% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.15);
        }
        100% {
          transform: scale(1);
        }
      }

      .live-status {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 9px;
        letter-spacing: 0.1em;
        color: var(--text-dim);
      }
      .live-status.connected {
        color: #22ff88;
      }
      .live-status.connected .status-dot {
        background: #22ff88;
        box-shadow: 0 0 8px #22ff88;
      }
    </style>
  </head>
  <body>
    <header class="header">
      <div class="header-title">⬡ BLUE CONTROLLER ⬡</div>
      <div class="header-sub">
        <span class="status-dot"></span>BLUE TEAM OPERATOR PANEL
      </div>
    </header>

    <div class="main">
      <div class="team-panel blue">
        <div class="team-header">
          <div
            class="team-avatar-wrap"
            onclick="document.getElementById('blueImgInput').click()"
          >
            <img class="team-avatar" id="blueAvatar" src="" alt="Blue Team" />
            <div class="avatar-overlay">CHANGE</div>
            <input
              type="file"
              id="blueImgInput"
              accept="image/*"
              onchange="handleImg(this)"
            />
          </div>
          <input
            class="team-name-input"
            id="blueName"
            type="text"
            placeholder="BLUE TEAM"
            maxlength="20"
          />
        </div>
        <div class="score-display" id="blueScore">0</div>
        <div class="score-buttons">
          <button class="score-btn add" onclick="adjustScore(5)">
            <span class="btn-label">+Technical Regs</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-5)">
            <span class="btn-label">−Technical Regs</span>
          </button>
          <button class="score-btn add" onclick="adjustScore(10)">
            <span class="btn-label">+Zone 1</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-10)">
            <span class="btn-label">−Zone 1</span>
          </button>
          <button class="score-btn add" onclick="adjustScore(10)">
            <span class="btn-label">+Zone 2</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-10)">
            <span class="btn-label">−Zone 2</span>
          </button>
          <button class="score-btn add" onclick="adjustScore(10)">
            <span class="btn-label">+Zone 3</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-10)">
            <span class="btn-label">−Zone 3</span>
          </button>
          <button class="score-btn add" onclick="adjustScore(10)">
            <span class="btn-label">+Zone 4</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-10)">
            <span class="btn-label">−Zone 4</span>
          </button>
          <button class="score-btn add" onclick="adjustScore(10)">
            <span class="btn-label">+Before TimeSet</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-10)">
            <span class="btn-label">−Before TimeSet</span>
          </button>
          <button class="score-btn add" onclick="adjustScore(25)">
            <span class="btn-label">+Goal Before Opponent</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-25)">
            <span class="btn-label">−Goal Before Opponent</span>
          </button>
          <button class="score-btn add" onclick="adjustScore(10)">
            <span class="btn-label">+Robot Stop At Finish</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-10)">
            <span class="btn-label">−Robot Stop At Finish</span>
          </button>
          <button class="score-btn add" onclick="adjustScore(10)">
            <span class="btn-label">+Resets &lt; 10</span>
          </button>
          <button class="score-btn sub" onclick="adjustScore(-10)">
            <span class="btn-label">−Resets &lt; 10</span>
          </button>
        </div>
      </div>
    </div>

    <div class="footer-bar">
      <div class="live-status" id="liveStatus">
        <span class="status-dot"></span>
        <span>CONNECTING...</span>
      </div>
      <div style="display: flex; gap: 8px">
        <button
          class="score-btn"
          onclick="exportCSV()"
          style="
            padding: 6px 12px;
            font-size: 11px;
            background: #0284c7;
            border-color: #0284c7;
            color: #fff;
            font-family: &quot;Fredoka One&quot;, cursive;
            border-radius: 6px;
            cursor: pointer;
          "
        >
          📥 EXPORT CSV
        </button>
      </div>
    </div>

    <script>
      // Get server host from current location
      const SERVER_URL =
        window.location.protocol +
        "//" +
        window.location.hostname +
        ":" +
        (window.location.port || "8888");
      const socket = io(SERVER_URL, {
        reconnection: true,
        reconnectionDelay: 100,
        reconnectionDelayMax: 5000,
        reconnectionAttempts: 5,
      });

      let currentState = {
        blueScore: 0,
        blueName: "BLUE TEAM",
        blueImg: "",
        blueSwitches: {},
        blueFinalDestTime: "",
        blueGoalBeforeTime: "",
      };

      let matchTimerState = { phase: "idle", playTotal: 120, remaining: 0 };

      function formatMMSS(sec) {
        const s = Math.max(0, sec);
        const m = Math.floor(s / 60);
        const ss = s % 60;
        return String(m).padStart(2, "0") + ":" + String(ss).padStart(2, "0");
      }

      function getPlayTimerDisplay() {
        const state = matchTimerState;
        if (state.phase === "play") return formatMMSS(state.remaining);
        if (state.phase === "done") return "00:00";
        return formatMMSS(state.playTotal);
      }

      socket.on("timer-state", (state) => {
        if (!state) return;
        matchTimerState = state;
      });

      socket.on("connect", () => {
        console.log("Connected to server");
        updateStatus(true);
      });

      socket.on("disconnect", () => {
        console.log("Disconnected from server");
        updateStatus(false);
      });

      socket.on("scoreboard-state", (data) => {
        if (
          data.blueScore !== undefined &&
          data.blueScore !== currentState.blueScore
        ) {
          currentState.blueScore = data.blueScore;
          document.getElementById("blueScore").textContent = data.blueScore;
          const el = document.getElementById("blueScore");
          el.classList.remove("score-bump");
          void el.offsetWidth;
          el.classList.add("score-bump");
        }

        if (
          data.blueName !== undefined &&
          data.blueName !== currentState.blueName
        ) {
          currentState.blueName = data.blueName;
          document.getElementById("blueName").value = data.blueName;
        }

        if (
          data.blueImg !== undefined &&
          data.blueImg !== currentState.blueImg
        ) {
          currentState.blueImg = data.blueImg;
          document.getElementById("blueAvatar").src = data.blueImg;
        }

        updateSwitchesUI(data);
      });

      function updateStatus(connected) {
        const el = document.getElementById("liveStatus");
        if (connected) {
          el.classList.add("connected");
          el.innerHTML =
            '<span class="status-dot"></span><span>LIVE · CONNECTED</span>';
        } else {
          el.classList.remove("connected");
          el.innerHTML = '<span class="status-dot"></span><span>OFFLINE</span>';
        }
      }

      function adjustScore(delta) {
        socket.emit("score-change", { team: "blue", delta });
      }

      function resetScore() {
        if (!confirm("Reset blue team score?")) return;
        socket.emit("score-change", {
          team: "blue",
          delta: -currentState.blueScore,
        });
      }

      function handleImg(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
          const imgData = e.target.result;
          document.getElementById("blueAvatar").src = imgData;
          socket.emit("team-update", {
            team: "blue",
            field: "image",
            value: imgData,
          });
        };
        reader.readAsDataURL(file);
      }

      document.getElementById("blueName").addEventListener("input", (e) => {
        socket.emit("team-update", {
          team: "blue",
          field: "name",
          value: e.target.value,
        });
      });

      // Switch State Management & CSV Export
      function initScoreSwitches(teamName) {
        const panels = document.querySelectorAll(".team-panel");
        panels.forEach((panel) => {
          let team = teamName;
          if (!team) {
            team = "blue";
          }

          const buttons = panel.querySelectorAll("button.score-btn");
          buttons.forEach((btn) => {
            const labelEl = btn.querySelector(".btn-label");
            if (!labelEl) return;
            const fullText = labelEl.textContent.trim();
            const isAdd = fullText.startsWith("+");
            const switchName = fullText.replace(/^[+−-]/, "").trim();

            btn.dataset.team = team;
            btn.dataset.switchName = switchName;
            btn.dataset.isAdd = isAdd;

            const onclickStr = btn.getAttribute("onclick") || "";
            const match = onclickStr.match(/-?\d+/);
            const delta = match ? parseInt(match[0], 10) : 0;
            btn.dataset.delta = delta;

            btn.onclick = (e) => {
              e.preventDefault();
              handleSwitchClick(team, switchName, isAdd, delta);
            };
          });
        });
      }

      function normalizeSwitchStatus(value) {
        if (value === true || value === "added") return "added";
        return "ready";
      }

      function handleSwitchClick(team, switchName, isAdd, delta) {
        const switches = currentState.blueSwitches || {};
        const status = normalizeSwitchStatus(switches[switchName]);

        if (isAdd && status === "ready") {
          let timeStr = "";
          if (switchName === "Goal Before Opponent") {
            timeStr = getPlayTimerDisplay();
          }
          socket.emit("tech-switch-change", {
            team,
            switchName,
            status: "added",
            delta,
            timeStr,
          });
        } else if (!isAdd && status === "added") {
          socket.emit("tech-switch-change", {
            team,
            switchName,
            status: "ready",
            delta,
          });
        }
      }

      function updateSwitchesUI(data) {
        currentState.blueSwitches = data.blueSwitches || {};
        currentState.blueFinalDestTime = data.blueFinalDestTime || "";
        currentState.blueGoalBeforeTime = data.blueGoalBeforeTime || "";

        const buttons = document.querySelectorAll("button.score-btn");
        buttons.forEach((btn) => {
          const team = btn.dataset.team;
          const switchName = btn.dataset.switchName;
          const isAdd = btn.dataset.isAdd === "true";

          if (!team || !switchName) return;

          const switches = currentState.blueSwitches;
          const status = normalizeSwitchStatus(switches[switchName]);

          btn.classList.remove("active");

          if (status === "ready") {
            btn.disabled = !isAdd;
          } else if (status === "added") {
            if (isAdd) {
              btn.classList.add("active");
              btn.disabled = true;
            } else {
              btn.disabled = false;
            }
          }
        });

        // Robot Stop At Finish time label
        const time = currentState.blueFinalDestTime;
        let label = document.getElementById("blueFinalDestLabel");
        if (!label) {
          const subBtn = Array.from(
            document.querySelectorAll("button.score-btn"),
          ).find(
            (btn) =>
              btn.dataset.team === "blue" &&
              btn.dataset.switchName === "Goal Before Opponent" &&
              btn.dataset.isAdd === "false",
          );
          if (subBtn) {
            label = document.createElement("div");
            label.id = "blueFinalDestLabel";
            label.style.cssText =
              "font-size:11px;color:#e65100;font-weight:bold;margin-top:4px;text-align:center;width:100%;grid-column:span 2;";
            subBtn.parentNode.insertBefore(label, subBtn.nextSibling);
          }
        }
        if (label) {
          label.textContent = time ? "Destination Time: " + time : "";
        }

        // Goal Goal Before Opponent / Goal Before Opponent time label
        const goalTime = currentState.blueGoalBeforeTime;
        let goalLabel = document.getElementById("blueGoalBeforeLabel");
        if (!goalLabel) {
          const subBtn = Array.from(
            document.querySelectorAll("button.score-btn"),
          ).find(
            (btn) =>
              btn.dataset.team === "blue" &&
              (btn.dataset.switchName === "Goal Before Opponent" ||
                btn.dataset.switchName === "Goal Goal Before Opponent") &&
              btn.dataset.isAdd === "false",
          );
          if (subBtn) {
            goalLabel = document.createElement("div");
            goalLabel.id = "blueGoalBeforeLabel";
            goalLabel.style.cssText =
              "font-size:11px;color:#7c3aed;font-weight:bold;margin-top:4px;text-align:center;width:100%;grid-column:span 2;";
            subBtn.parentNode.insertBefore(goalLabel, subBtn.nextSibling);
          }
        }
        if (goalLabel) {
          goalLabel.textContent = goalTime ? "Goal Time: " + goalTime : "";
        }
      }

      function exportCSV() {
        const rows = [
          [
            "Team",
            "Score",
            "Robot Stop At Finish Time",
            "Goal Before Opponent Time",
            "Active Zones",
          ],
          [
            currentState.blueName || "Blue Team",
            currentState.blueScore || 0,
            currentState.blueFinalDestTime || "N/A",
            currentState.blueGoalBeforeTime || "N/A",
            Object.entries(currentState.blueSwitches || {})
              .filter(([_, status]) => status === "added")
              .map(([name]) => name)
              .join("; ") || "None",
          ],
        ];

        const formatCsvValue = (val) => {
          const text = val == null ? "" : String(val);
          return `"${text.replace(/"/g, '""')}"`;
        };

        const csvContent = rows
          .map((row) => row.map(formatCsvValue).join(","))
          .join("\r\n");

        const blob = new Blob([csvContent], {
          type: "text/csv;charset=utf-8;",
        });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `TechBot_BlueTeam_Results_${new Date().toISOString().slice(0, 10)}.csv`;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      // Initialize switches after script runs
      setTimeout(() => {
        initScoreSwitches("blue");
        updateSwitchesUI(currentState);
      }, 100);
    </script>
  </body>
</html>
