<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>RoboRace Config</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap"
      rel="stylesheet">
    <link rel="stylesheet" href="/style/config.css">
    <script src="/socket.io/socket.io.js"></script>
    <style>
     
    </style>
  </head>
  <body>
    <div id="bg-custom"></div>
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>

    <div class="top-bar">
      <div class="brand">
        <div class="brand-mark">⚙</div>
        <div class="brand-copy">
          <h1>RoboRace Config</h1>
          <p>Team Button Monitor</p>
        </div>
      </div>
      <div id="connection-pill" class="connection-pill">
        <div class="status-dot"></div>
        <span id="connection-text">Disconnected</span>
      </div>
    </div>

    <div class="content">
      <div class="panel">
        <div class="panel-head">
          <div>
            <div class="title">Arduino Button States</div>
            <div class="subtitle">Live status for Team 1 through
              Team 5</div>
          </div>
          <div class="connection-note">Updates from socket.io</div>
        </div>

        <div class="teams-grid">
          <div class="team-card" data-team="1"
            style="--tc:#3B82F6;--tc-soft:rgba(59,130,246,.08)">
            <div class="team-id">Team 1</div>
            <div class="team-icon"><span
                class="emoji">🤖</span></div>
            <div class="team-label">Team 1</div>
            <div class="status-value off" id="team-1">OFF</div>
          </div>

          <div class="team-card" data-team="2"
            style="--tc:#EF4444;--tc-soft:rgba(239,68,68,.08)">
            <div class="team-id">Team 2</div>
            <div class="team-icon"><span
                class="emoji">👾</span></div>
            <div class="team-label">Team 2</div>
            <div class="status-value off" id="team-2">OFF</div>
          </div>

          <div class="team-card" data-team="3"
            style="--tc:#22C55E;--tc-soft:rgba(34,197,94,.08)">
            <div class="team-id">Team 3</div>
            <div class="team-icon"><span
                class="emoji">🦾</span></div>
            <div class="team-label">Team 3</div>
            <div class="status-value off" id="team-3">OFF</div>
          </div>

          <div class="team-card" data-team="4"
            style="--tc:#F59E0B;--tc-soft:rgba(245,158,11,.08)">
            <div class="team-id">Team 4</div>
            <div class="team-icon"><span
                class="emoji">🧠</span></div>
            <div class="team-label">Team 4</div>
            <div class="status-value off" id="team-4">OFF</div>
          </div>

          <div class="team-card" data-team="5"
            style="--tc:#8B5CF6;--tc-soft:rgba(139,92,246,.08)">
            <div class="team-id">Team 5</div>
            <div class="team-icon"><span
                class="emoji">⚙️</span></div>
            <div class="team-label">Team 5</div>
            <div class="status-value off" id="team-5">OFF</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const socket = io();

      socket.on("arduino-status", (isConnected) => {
        const pill = document.getElementById("connection-pill");
        const text = document.getElementById("connection-text");

        if (isConnected) {
          pill.classList.add("connected");
          text.textContent = "Connected";
        } else {
          pill.classList.remove("connected");
          text.textContent = "Disconnected";
        }
      });

      socket.on("button-update", (data) => {
        applyButtonState(data);
      });

      function applyButtonState(data) {
  const status = document.getElementById(`team-${data.id}`);
  const card = document.querySelector(`.team-card[data-team="${data.id}"]`);

  if (!status || !card) return;

  const isPressed = data.pressed === true;
  const isReady = data.ready === true;

  // =========================
  // PRESSED
  // =========================
  if (isPressed) {
    status.textContent = "ON";
    status.className = "status-value on";
    card.classList.add("finished");
    return;
  }

  // =========================
  // READY = WAITING
  // =========================
  if (isReady) {
    status.textContent = "READY";
    status.className = "status-value off";
    card.classList.remove("finished");
  }
}
    </script>
  </body>
</html>
