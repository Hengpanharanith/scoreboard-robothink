<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title>RoboRace Display</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Fredoka+One&display=swap"
      rel="stylesheet">
    <style>
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{width:100%;height:100%;overflow:hidden;}
  body{
    background:#E8EEFF;
    font-family:'Fredoka One',cursive;
    display:flex;flex-direction:column;
    position:relative;
  }

  /* ── BACKGROUND LAYERS ── */
  #bg-custom{position:absolute;inset:0;background-size:cover;background-position:center;opacity:.12;z-index:0;transition:all .5s;}

  /* Robot SVG pattern background */
  #bg-robots{
    position:absolute;inset:0;z-index:1;pointer-events:none;overflow:hidden;
  }
  .bg-robo{
    position:absolute;font-size:var(--sz,48px);opacity:.07;
    animation:bgFloat var(--dur,18s) ease-in-out infinite;
    animation-delay:var(--del,0s);
  }
  @keyframes bgFloat{
    0%{transform:translate(0,0) rotate(var(--r0,0deg)) scale(1);}
    33%{transform:translate(var(--mx,20px),var(--my,-30px)) rotate(var(--r1,10deg)) scale(1.05);}
    66%{transform:translate(var(--mx2,-15px),var(--my2,20px)) rotate(var(--r2,-8deg)) scale(.97);}
    100%{transform:translate(0,0) rotate(var(--r0,0deg)) scale(1);}
  }

  /* Gear SVG deco */
  .gear-svg{position:absolute;z-index:1;opacity:.06;animation:spinGear var(--spd,20s) linear infinite;}
  @keyframes spinGear{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}

  /* Colour blobs */
  .blob{position:absolute;border-radius:50%;filter:blur(80px);z-index:1;animation:blobDrift 12s ease-in-out infinite;}
  @keyframes blobDrift{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,-20px) scale(1.08)}}
  .b1{width:600px;height:600px;background:#3B82F6;opacity:.10;top:-160px;left:-180px;}
  .b2{width:500px;height:500px;background:#8B5CF6;opacity:.09;bottom:-130px;right:-140px;animation-delay:4s;}
  .b3{width:350px;height:350px;background:#22C55E;opacity:.07;top:25%;left:55%;animation-delay:8s;}
  .b4{width:280px;height:280px;background:#F59E0B;opacity:.07;bottom:15%;left:5%;animation-delay:6s;}

  /* ── TOP BAR ── */
  .top-bar{
    position:relative;z-index:20;
    
    padding:10px 20px;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:6px;
   
    flex-shrink:0;
  }
  .event-label{font-size:16px;color:#3B82F6;letter-spacing:3px;text-transform:uppercase;font-family:'Fredoka One',cursive;text-align:center;font-weight:900;}
  .round-pill{
    background:#8B5CF6;border:none;
    color:white;font-size:14px;padding:5px 20px;border-radius:20px;letter-spacing:1px;font-weight:900;
  }

  /* ── TIMER ── */
  .timer-wrap{
    position:relative;z-index:10;
    display:flex;flex-direction:column;align-items:center;
    padding:6px 0 0;flex-shrink:0;
  }
  .timer-lbl{font-family:'Nunito',sans-serif;font-weight:800;font-size:11px;letter-spacing:4px;color:#7C9CBD;text-transform:uppercase;margin-bottom:0;}
  .timer-val{
    font-size:74px;color:#1E293B;letter-spacing:6px;line-height:1;
    text-shadow:0 6px 20px rgba(0,0,0,.1);transition:color .3s;
  }
  .timer-val.urgent{color:#EF4444;animation:tBlink .5s infinite;text-shadow:0 0 28px rgba(239,68,68,.5);}
  @keyframes tBlink{0%,100%{opacity:1}50%{opacity:.35}}

  /* ── TEAMS AREA ── */
  #teams-area{
    position:relative;z-index:10;
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:4px 30px 6px;
    min-height:0;
  }
  #teams-grid{
    display:flex;
    align-items:stretch;
    justify-content:center;
    gap:18px;
    width:100%;
    max-width:1240px;
  }

  /* ── TEAM CARD ── */
  .team-card{
    background:rgba(255,255,255,.88);
    border-radius:26px;
    padding:18px 14px 14px;
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    box-shadow:0 8px 36px rgba(0,0,0,.11);
    border:3px solid #D1D9F0;
    position:relative;
    transition:all .5s cubic-bezier(.23,1,.32,1);
    flex:1;
    min-width:0;
    overflow:hidden;
    backdrop-filter:blur(6px);
  }
  /* coloured top accent */
  .team-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:6px;
    border-radius:26px 26px 0 0;
    background:var(--tc,#3B82F6);
    transition:background .3s;
  }
  /* subtle colour wash */
  .team-card::after{
    content:'';position:absolute;inset:0;
    background:radial-gradient(ellipse at 50% 0%,var(--tc-soft,rgba(59,130,246,.07)) 0%,transparent 65%);
    z-index:0;pointer-events:none;
  }
  .team-card>*{position:relative;z-index:1;}

  .team-card.finished{
    border-color:var(--tc);
    box-shadow:0 16px 50px rgba(0,0,0,.16),0 0 0 3px var(--tc);
    transform:translateY(-10px) scale(1.025);
    background:rgba(255,255,255,.96);
  }
  .team-card.rank-1{background:linear-gradient(160deg,rgba(255,252,235,.97),rgba(254,243,199,.97));}

  /* ── MEDAL BADGE ── */
  .rank-badge{
    position:absolute;top:4px;right:12px;
    font-size:40px;line-height:1;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,.25));
    animation:medalPop .5s cubic-bezier(.23,1,.32,1);
    z-index:5;
  }
  @keyframes medalPop{0%{transform:scale(0) rotate(-25deg)}65%{transform:scale(1.35) rotate(6deg)}100%{transform:scale(1) rotate(0)}}

  /* ── TEAM IMAGE ── */
  .team-img-wrap{
    width:120px;height:120px;
    border-radius:22px;
    background:#EEF2FF;
    border:4px solid rgba(255,255,255,.8);
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;
    margin-bottom:10px;
    box-shadow:0 6px 24px rgba(0,0,0,.12);
    transition:border-color .3s, box-shadow .3s;
    flex-shrink:0;
  }
  .team-card.finished .team-img-wrap{
    border-color:var(--tc);
    box-shadow:0 6px 24px rgba(0,0,0,.12),0 0 0 3px var(--tc)40;
  }
  .team-img-wrap img{width:100%;height:100%;object-fit:cover;}
  /* Float animation for uploaded images */
  .img-float{animation:imgFloat var(--fdur,3s) ease-in-out infinite;animation-delay:var(--fdel,0s);}
  @keyframes imgFloat{
    0%,100%{transform:translateY(0) rotate(-2deg);}
    50%{transform:translateY(-10px) rotate(2deg);}
  }
  /* Emoji bob for default */
  .emoji-bob{display:inline-block;font-size:64px;animation:emojiRock var(--fdur,2.8s) ease-in-out infinite;animation-delay:var(--fdel,0s);}
  @keyframes emojiRock{
    0%,100%{transform:translateY(0) rotate(-4deg) scale(1);}
    50%{transform:translateY(-12px) rotate(4deg) scale(1.05);}
  }

  /* ── TEAM NAME ── */
  .team-name-text{
    font-size:20px;font-weight:900;text-align:center;
    margin-bottom:8px;letter-spacing:.5px;
    color:#1E293B;
    word-break:break-word;
    line-height:1.2;
  }
  .team-card.finished .team-name-text{color:var(--tc);}

  /* ── STATUS CHIP ── */
  .status-chip{
    font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;
    padding:5px 14px;border-radius:20px;letter-spacing:.5px;
    transition:all .35s;white-space:nowrap;
  }
  .s-wait{background:#F1F5F9;color:#94A3B8;border:2px solid #E2E8F0;}
  .s-done{color:white;border:2px solid transparent;}

  /* ── FINISH TIME ── */
  .finish-chip{
    margin-top:6px;
    font-family:'Nunito',sans-serif;font-weight:800;font-size:12px;
    padding:3px 12px;border-radius:12px;
    opacity:0;transform:translateY(8px);transition:all .35s .12s;
    white-space:nowrap;
  }
  .team-card.finished .finish-chip{opacity:1;transform:translateY(0);}

  /* ── CONFETTI ── */
  .cf{position:fixed;pointer-events:none;z-index:200;animation:cfFall 1.4s ease-out forwards;}
  @keyframes cfFall{0%{opacity:1;transform:translateY(0) rotate(0deg) scale(1)}100%{opacity:0;transform:translateY(260px) rotate(500deg) scale(.4)}}

  /* ── SPONSOR BAR — single row, 3 columns ── */
  @keyframes logoFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}

  .bottom-bar{
    position:relative;z-index:20;flex-shrink:0;
    display:none; /* hidden until at least one col has logos */
    background:rgba(255,255,255,.93);
    border-top:3px solid #E2E8F0;
    backdrop-filter:blur(10px);
    box-shadow:0 -4px 20px rgba(0,0,0,.06);
  }
  .bottom-bar.visible{display:flex;}

  .sponsor-cols{
    display:flex;
    align-items:stretch;
    width:100%;
    min-height:0;
  }

  /* Each column */
  .sp-col{
    display:none;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:5px;
    padding:10px 20px;
    flex:1;
    overflow:hidden;
  }
  .sp-col.has-logos{display:flex;}

  /* dividers between visible cols */
  .sp-col + .sp-col.has-logos{
    border-left:2px solid #E2E8F0;
  }

  .sp-col-label{
    font-family:'Nunito',sans-serif;font-weight:900;font-size:9px;
    letter-spacing:4px;text-transform:uppercase;white-space:nowrap;
    flex-shrink:0;
  }
  .sp-col-label.lbl-title{color:#D97706;}
  .sp-col-label.lbl-sponsor{color:#3B82F6;}
  .sp-col-label.lbl-partner{color:#7C3AED;}

  .logos-row{
    display:flex;align-items:center;justify-content:center;
    gap:10px;flex-wrap:nowrap;overflow:hidden;
    max-width:100%;
  }

  /* Title sponsor logos — biggest */
  .sp-col.col-title .logos-row img{
    height:72px;max-width:200px;object-fit:contain;
    background:white;border-radius:12px;padding:8px 18px;
    border:2px solid #FDE68A;
    box-shadow:0 4px 14px rgba(245,158,11,.18);
    animation:logoFloat 3s ease-in-out infinite;
    animation-delay:calc(var(--li,0) * .25s);
    flex-shrink:0;
  }

  /* Sponsor logos — medium */
  .sp-col.col-sponsor .logos-row img{
    height:56px;max-width:150px;object-fit:contain;
    background:white;border-radius:10px;padding:7px 14px;
    border:2px solid #BFDBFE;
    box-shadow:0 3px 10px rgba(59,130,246,.1);
    animation:logoFloat 3.5s ease-in-out infinite;
    animation-delay:calc(var(--li,0) * .3s);
    flex-shrink:0;
  }

  /* Partner logos — smallest */
  .sp-col.col-partner .logos-row img{
    height:44px;max-width:120px;object-fit:contain;
    background:white;border-radius:9px;padding:6px 10px;
    border:2px solid #DDD6FE;
    box-shadow:0 2px 8px rgba(139,92,246,.09);
    animation:logoFloat 4s ease-in-out infinite;
    animation-delay:calc(var(--li,0) * .35s);
    flex-shrink:0;
  }
</style>
  </head>
  <body>

    <!-- BG layers -->
    <div id="bg-custom"></div>
    <div id="bg-robots">
      <!-- Dense robot pattern — big ones anchored, small ones drifting -->
      <div class="bg-robo"
        style="--sz:90px;left:2%;top:12%;--dur:14s;--del:-2s;--mx:18px;--my:-28px;--mx2:-12px;--my2:22px;--r0:-5deg;--r1:8deg;--r2:-6deg;">🤖</div>
      <div class="bg-robo"
        style="--sz:70px;left:88%;top:8%;--dur:17s;--del:-6s;--mx:-20px;--my:-22px;--mx2:16px;--my2:30px;--r0:4deg;--r1:-10deg;--r2:7deg;">🤖</div>
      <div class="bg-robo"
        style="--sz:55px;left:48%;top:6%;--dur:20s;--del:-10s;--mx:24px;--my:-18px;--mx2:-18px;--my2:24px;--r0:-3deg;--r1:12deg;--r2:-9deg;">⚙️</div>
      <div class="bg-robo"
        style="--sz:80px;left:15%;top:60%;--dur:15s;--del:-4s;--mx:-22px;--my:-32px;--mx2:18px;--my2:16px;--r0:6deg;--r1:-8deg;--r2:10deg;">🦾</div>
      <div class="bg-robo"
        style="--sz:65px;left:75%;top:55%;--dur:19s;--del:-8s;--mx:16px;--my:-26px;--mx2:-14px;--my2:20px;--r0:-7deg;--r1:9deg;--r2:-5deg;">⚙️</div>
      <div class="bg-robo"
        style="--sz:50px;left:32%;top:78%;--dur:22s;--del:-14s;--mx:-18px;--my:-20px;--mx2:22px;--my2:14px;--r0:3deg;--r1:-11deg;--r2:8deg;">🔩</div>
      <div class="bg-robo"
        style="--sz:60px;left:62%;top:82%;--dur:16s;--del:-3s;--mx:20px;--my:-24px;--mx2:-16px;--my2:18px;--r0:-4deg;--r1:7deg;--r2:-9deg;">🤖</div>
      <div class="bg-robo"
        style="--sz:44px;left:5%;top:82%;--dur:25s;--del:-18s;--mx:-12px;--my:-16px;--mx2:10px;--my2:20px;--r0:5deg;--r1:-6deg;--r2:4deg;">🧠</div>
      <div class="bg-robo"
        style="--sz:42px;left:92%;top:70%;--dur:23s;--del:-9s;--mx:14px;--my:-18px;--mx2:-10px;--my2:22px;--r0:-6deg;--r1:8deg;--r2:-4deg;">🔧</div>
      <div class="bg-robo"
        style="--sz:38px;left:55%;top:30%;--dur:27s;--del:-20s;--mx:-16px;--my:-14px;--mx2:12px;--my2:18px;--r0:2deg;--r1:-9deg;--r2:7deg;">👾</div>
      <!-- Gears as SVG circles for extra depth -->
      <svg class="gear-svg"
        style="--spd:30s;left:10%;top:40%;width:120px;height:120px;"
        viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="30" fill="none" stroke="#3B82F6"
          stroke-width="6" stroke-dasharray="8 4" />
        <circle cx="50" cy="50" r="18" fill="none" stroke="#3B82F6"
          stroke-width="3" />
      </svg>
      <svg class="gear-svg"
        style="--spd:22s;left:82%;top:25%;width:90px;height:90px;animation-direction:reverse;"
        viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="28" fill="none" stroke="#8B5CF6"
          stroke-width="5" stroke-dasharray="6 3" />
        <circle cx="50" cy="50" r="15" fill="none" stroke="#8B5CF6"
          stroke-width="3" />
      </svg>
      <svg class="gear-svg"
        style="--spd:40s;left:45%;top:65%;width:70px;height:70px;"
        viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="25" fill="none" stroke="#22C55E"
          stroke-width="4" stroke-dasharray="5 4" />
      </svg>
    </div>

    <!-- Colour blobs -->
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
    <div class="blob b4"></div>

    <!-- TOP BAR -->
    <div class="top-bar">
      <div class="event-label" id="eventLabel">Robot Think · Competition ·
        2026</div>
      <div class="round-pill" id="roundPill">Round 1 · Qualifying</div>
    </div>

    <!-- TIMER -->
    <div class="timer-wrap">
      <div class="timer-lbl">⏱ Match Time</div>
      <div class="timer-val" id="timerVal">10:00</div>
    </div>

    <!-- TEAMS -->
    <div id="teams-area">
      <div id="teams-grid"></div>
    </div>

    <!-- BOTTOM SPONSOR BAR — single row, 3 cols -->
    <div class="bottom-bar" id="bottomBar">
      <div class="sponsor-cols">
        <div class="sp-col col-title" id="colTitle">
          <div class="sp-col-label lbl-title">🌟 Title Sponsor</div>
          <div class="logos-row" id="logosTitle"></div>
        </div>
        <div class="sp-col col-sponsor" id="colSponsor">
          <div class="sp-col-label lbl-sponsor">⭐ Sponsors</div>
          <div class="logos-row" id="logosSponsor"></div>
        </div>
        <div class="sp-col col-partner" id="colPartner">
          <div class="sp-col-label lbl-partner">🤝 Partners</div>
          <div class="logos-row" id="logosPartner"></div>
        </div>
      </div>
    </div>

    <script>
const MEDALS=['🥇','🥈','🥉','4️⃣','5️⃣'];
const CC=['#3B82F6','#EF4444','#22C55E','#F59E0B','#8B5CF6','#EC4899','#F97316'];
let prevFO=[];

function spawnConfetti(x,y){
  for(let i=0;i<24;i++){
    const el=document.createElement('div');
    el.className='cf';
    el.style.cssText=`left:${x+(Math.random()-.5)*200}px;top:${y}px;
      background:${CC[Math.floor(Math.random()*CC.length)]};
      border-radius:${Math.random()>.5?'50%':'3px'};
      width:${7+Math.random()*9}px;height:${7+Math.random()*9}px;
      animation-delay:${Math.random()*.35}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),1800);
  }
}

function renderTeams(teams,fo){
  const grid=document.getElementById('teams-grid');
  // sync cards
  const existIds=new Set([...grid.children].map(c=>c.id));
  const newIds=new Set(teams.map(t=>'tc_'+t.id));
  // remove deleted
  [...grid.children].forEach(c=>{ if(!newIds.has(c.id)) c.remove(); });

  teams.forEach((t,i)=>{
    const rank=fo.includes(t.id)?fo.indexOf(t.id)+1:null;
    let card=document.getElementById('tc_'+t.id);
    if(!card){
      card=document.createElement('div');
      card.id='tc_'+t.id;
      grid.appendChild(card);
    }
    const wasFinished=prevFO.includes(t.id);
    const justFinished=!wasFinished&&!!rank;

    // set CSS var for colour
    const tc=t.color||'#3B82F6';
    card.style.setProperty('--tc',tc);
    card.style.setProperty('--tc-soft',tc+'12');
    card.className='team-card'+(rank?' finished':'')+(rank===1?' rank-1':'');

    const fdur=(2.5+i*.4)+'s';
    const fdel=(i*.3)+'s';

    card.innerHTML=`
      ${rank?`<div class="rank-badge">${MEDALS[rank-1]}</div>`:''}
      <div class="team-img-wrap">
        ${t.img
          ?`<img class="img-float" style="--fdur:${fdur};--fdel:${fdel}" src="${t.img}">`
          :`<span class="emoji-bob" style="--fdur:${fdur};--fdel:${fdel}">${t.emoji||'🤖'}</span>`}
      </div>
      <div class="team-name-text">${t.name}</div>
      <div class="status-chip ${rank?'s-done':'s-wait'}" style="${rank?`background:${tc};border-color:${tc}`:''}">
        ${rank?`#${rank} FINISHED`:'⏳ Waiting...'}
      </div>
      <div class="finish-chip" style="color:${tc};background:${tc}18;border:2px solid ${tc}40;">
        ⏱ ${t.finishTime||''}
      </div>
    `;

    if(justFinished){
      const r=card.getBoundingClientRect();
      spawnConfetti(r.left+r.width/2,r.top+r.height/2);
    }
  });
  prevFO=[...fo];
}

function setLogos(colId, containerId, items){
  const col=document.getElementById(colId);
  const cont=document.getElementById(containerId);
  if(!items||!items.length){
    col.classList.remove('has-logos');
  } else {
    col.classList.add('has-logos');
    cont.innerHTML=items.map((s,i)=>`<img src="${s.src}" style="--li:${i}" alt="">`).join('');
  }
  // show/hide the whole bar based on whether any col is active
  const anyVisible=[...document.querySelectorAll('.sp-col')].some(c=>c.classList.contains('has-logos'));
  document.getElementById('bottomBar').classList.toggle('visible',anyVisible);
}

window.addEventListener('message',(ev)=>{
  const d=ev.data;
  if(d.eventName) document.getElementById('eventLabel').textContent=d.eventName;
  if(d.roundNum!=null||d.roundLabel!=null)
    document.getElementById('roundPill').textContent=`Round ${d.roundNum||'1'} · ${d.roundLabel||''}`;

  const tv=document.getElementById('timerVal');
  tv.textContent=d.timer||'00:00';
  tv.classList.toggle('urgent',!!d.timerUrgent);

  if(d.background) document.getElementById('bg-custom').style.backgroundImage=`url(${d.background})`;

  if(d.teams) renderTeams(d.teams,d.finishOrder||[]);

  setLogos('colTitle','logosTitle',d.titleSponsors);
  setLogos('colSponsor','logosSponsor',d.sponsors);
  setLogos('colPartner','logosPartner',d.partners);
});
</script>
  </body>
</html>
